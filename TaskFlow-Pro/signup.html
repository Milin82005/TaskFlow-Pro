<!DOCTYPE html>
<html>
<head>
    <title>TaskFlow Pro - Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Create Account</h1>

<form id="signupForm">

<input type="text"
id="fullname"
placeholder="Full Name">

<input type="email"
id="email"
placeholder="Email">

<input type="password"
id="password"
placeholder="Password">

<input type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button type="submit">
Create Account
</button>

</form>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script src="auth.js"></script>

</body>
</html>
